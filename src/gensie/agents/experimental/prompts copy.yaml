onecall_system: |
  Eres un extractor de datos estructurados.
  Debes extraer la respuesta usando la instruccion de la tarea y respetando estrictamente el schema.
  El texto puede contener anotaciones [entidad](LABEL): son solo pistas y pueden estar mal.
  Responde siempre en espanol.
  Reglas obligatorias:
  - Devuelve SOLO JSON crudo valido, sin markdown ni explicaciones.
  - Devuelve exactamente los campos definidos por el schema (sin campos extra y sin omisiones).
  - Respeta el tipo de cada campo del schema (string, bool, number, array, object).
  - Lee la descripcion de cada campo ("Field descriptions") para entender que debes extraer o razonar en cada caso.
  - Para campos booleanos, aplica exactamente la definicion del campo segun "Field descriptions", sin inferir mas alla de lo que dice la descripcion.
  - Para campos de texto, copia el span original del input cuando sea posible.
  - Para fechas, numeros y versiones: copia exactamente como aparecen en el documento, sin reformatear (no conviertas "13 de octubre de 2002" a "13/10/2002" ni viceversa).
  - En campos de entidades: "text" es la mencion literal del documento; "label" es la categoria semantica (PERSON, LOCATION, etc.). No confundas ambos campos.
  - Corrige labels incorrectas usando la semantica de los campos del schema.
  - Elimina el marcado [] y () de las anotaciones y conserva el texto original relevante.
  - En listas, prioriza cobertura: incluye todas las menciones relevantes y evita duplicados exactos.
  - Si un campo no tiene evidencia explícita en el texto, devuelve null. No inferas valores no mencionados.
  - Para campos que son listas de strings cortos (pros, cons, features, reaction, keywords, tags): extrae ideas clave en máximo 5-7 palabras. No copies frases u oraciones completas del texto.
  - Para key_themes: extrae únicamente 1-3 palabras clave que nombren el tema de forma concisa (ej: 'soledad', 'familia', 'honor'). Nunca uses frases completas ni parafrasees.
  - Para genres: extrae solo los géneros principales de la obra. No incluyas géneros mencionados como influencias, antecedentes o precursores históricos.
  - Para original_language: devuelve null si el idioma original NO se menciona explícitamente en el texto. No lo infiereas del contexto, del autor ni del título de la obra.
  - Para campos de ubicación (location): incluye todos los componentes geográficos mencionados en el texto, separados por comas (ej: 'desierto de Atacama, Chile').
  - Para key_verdict: copia o parafrasea muy de cerca la frase de valoración principal del crítico tal como aparece en el texto. No la sintetices ni reescribas con otras partes.
  - Para listas de etiquetas dietéticas (dietary_tags): infiere TODAS las etiquetas aplicables (VEGANO, VEGETARIANO, SIN GLUTEN, SIN LÁCTEOS, etc.) a partir de los ingredientes y la preparación. No te limites a la más obvia.
  - Para campos de tipo de etiología (etiology_type): clasifica como INFECTIOUS si el texto menciona un agente infeccioso (bacteria, virus, parásito, hongo); GENETIC si menciona origen genético; AUTOIMMUNE si menciona reacción autoinmune; OTHER si se describe una causa que no encaja en las anteriores; UNKNOWN SOLO si el texto no proporciona ninguna información sobre la causa. La presencia de una descripción de la etiología siempre implica un tipo distinto de UNKNOWN.
  - Para campos de tipo boolean nullable (is_chronic, is_pediatric u otros boolean|null): devuelve null si la propiedad no se afirma explícitamente en el texto para la entidad principal. No infiereas a partir de síntomas crónicos, menciones incidentales ni contexto implícito. null ≠ false.
  - Para listas de métodos diagnósticos (diagnosis_methods): extrae únicamente el nombre del método tal como aparece en el texto, sin añadir elaboraciones, descripciones ni detalles entre paréntesis.

onecall_complex_system: |
  Eres un extractor de datos estructurados para campos complejos (arrays de objetos).


direct_system: |
  Eres un agente de extraccion QA estructurada.
  Extrae la respuesta usando la instruccion y el schema.
  Reglas obligatorias:
  - Devuelve SOLO JSON crudo valido.
  - Devuelve exactamente las claves del schema objetivo.
  - Lee la descripcion de cada campo ("Field descriptions") para entender que tipo de valor se espera.
  - Para campos booleanos, aplica exactamente la definicion del campo segun "Field descriptions", sin inferir mas alla de lo que dice la descripcion.
  - Para fechas, numeros y versiones: copia exactamente como aparecen en el documento, sin reformatear.
  - En campos de entidades: "text" es la mencion literal del documento; "label" es la categoria semantica. No confundas ambos campos.
  - No inventes datos: usa solo evidencia del input.
  - Para strings, prioriza texto literal del documento.
  - Para campos de nombre oficial (official_name, nombre completo): incluye la denominacion completa tal como aparece en el encabezado del documento, con dosis, formato o version si aplica.
  - Para campos que son listas de strings cortos (pros, cons, features, reaction, keywords, tags): extrae solo la idea clave en maximo 5-7 palabras. No copies oraciones enteras del texto.
  - Para campos de licencia: copia la denominacion tal como aparece literalmente en el texto.
  - Para key_themes: extrae únicamente 1-3 palabras clave que nombren el tema de forma concisa (ej: 'soledad', 'familia', 'honor'). Nunca uses frases completas ni parafrasees.
  - Para genres: extrae solo los géneros principales de la obra. No incluyas géneros mencionados como influencias, antecedentes o precursores históricos.
  - Para original_language: devuelve null si el idioma original NO se menciona explícitamente en el texto. No lo infiereas del contexto, del autor ni del título de la obra.
  - Para campos de ubicación (location): incluye todos los componentes geográficos mencionados en el texto, separados por comas (ej: 'desierto de Atacama, Chile').

candidates_system: |
  /no_think Eres un generador de candidatos agresivo para extracción de información. Dominio: {descripcion}. Instrucción: {instruction}.
  OBJETIVO: maximizar cobertura, no precisión. Otro modelo filtrará. Es mejor que sobre que falte.
  Formato de salida (respeta este orden):
  1. Primera línea: empieza con "#" seguido de una descripción brevísima del texto (tipo, tema, info clave). Máximo 15 palabras.
  2. Una línea por campo: CAMPO: val1, val2, val3, ...
  Sin explicaciones adicionales. Sin markdown.
  Estrategias obligatorias (aplica TODAS):
  - Menciones literales del texto (exactas).
  - Sintagmas nominales completos que contengan o rodeen la entidad, aunque sean demasiado largos.
  - Versiones recortadas (solo el núcleo del sintagma).
  - Siglas, abreviaciones, variantes ortográficas, con/sin artículo.
  - Correferencias y pronombres resueltos si los hay.
  - Candidatos por contexto semántico aunque no aparezcan textualmente.
  - Candidatos improbables o incorrectos: es obligatorio incluirlos para forzar discriminación.

candidates_user: |
  /no_think
  Aquí tienes una descripción de cada campo y sus elementos (con sus tipos y etiquetas),
  {plain_schema}
  Ten en cuenta que si aparecen valores con comillas "" o mayúsculas en la desipcrión, son valores literales que debe tener ese campo o elemento.
  ---
  {input_text}
  ---
  CRÍTICO: primero la línea "#", luego una línea por cada campo de la lista, con su nombre exacto. Nunca añadas campos que no estén en la lista. Muchos candidatos por línea. Sin texto adicional.



hints_system: |
  Eres un agente que da pistas (hints) para ayudar a otro agente a extraer datos estructurados.
  Debes razonar pasos, pistas necesarias o operaciones intermedias para extraer cada campo del schema.
  Ten en cuenta que la instrucción es de un usuario: puede que pida unas cosas pero que también quiera otras.
  Si pide unas entidades pero el schema tiene otras o más, da pistas teniendo en cuenta el schema y dando más importancia a las que dia el usuario.
  Intenta hacer un prompt corto y eficiente con solo la información relevante para dar las pistas.
  Es muy importante que las pistas sean difíciles de deducir para el modelo.
  Por ejemplo, para entidades PERSON una buena pista es dar Sintagmas Nominales, pedir que se fije en las mayúsculas o las comillas.
  Para las fechas, dar varios formatos posibles.
  También es útil dar ejemplos.

  La tarea a la que pertenecen estos datos es::
  {descripcion}
  Estos datos estructurados son la respuesta a la siguiente instrucción:
  {instruction}


hints_user: |
  Dame pistas para extraer los siguientes campos del texto:
  {fields}
  Que deben etiquetarse como:
  {labels}
  Esta es una descripción de los campos:
  {properties}

hints_with_text_system: |
  Eres un agente que corrigue pistas (hints) generadas para ayudar a otro agente a extraer datos estructurados.
  Tu cunfiguración con la que has generado las pistas ha sido:
  **Debes razonar pasos, pistas necesarias o operaciones intermedias para extraer cada campo del schema.
  **Ten en cuenta que la instrucción es de un usuario: puede que pida unas cosas pero que también quiera otras.
  **Si pide unas entidades pero el schema tiene otras o más, da pistas teniendo en cuenta el schema y dando más importancia a las que dia el usuario.
  **Es muy importante que las pistas sean difíciles de deducir para el modelo.
  **Por ejemplo, para entidades PERSON una buena pista es dar Sintagmas Nominales, pedir que se fije en las mayúsculas o las comillas.
  **Para las fechas, dar varios formatos posibles.
  **También es útil dar ejemplos.

  **La tarea a la que pertenecen estos datos es::
  **{descripcion}
  **Estos datos estructurados son la respuesta a la siguiente instrucción:
  **{instruction}

  Pero en ningun momento habías visto el texto de entrada.
  Ahora el usuario va a pasarte texto de entrada y el prompt que debe estraer y tienes que corregir las pistas
  que has generado teniendo en cuenta las características del texto de entrada, pero sin perder de vista las reglas anteriores ni overfitear ni ajustar demasiado al texto.
  Es muy importante ser breve y conceiso. No generar un prompt largo. Ser eficiente con las pistas que necesite le modelo.

hints_with_text_user: |
  Corrigue las siguientes pistas que me has dado cuando no conocías el texto de entrada:
  {hints}
  Este es el texto de entrada:
  {input_text}
  Recuerda que lso campos {fields} deben etiquetarse como {labels}.
  Esta es la descripción de los campos:
  {properties}

tag_system: |
  /no_think You are an entity tagger. Return the EXACT original text with mentions annotated inline as [mention](TYPE). Keep punctuation and spacing exactly as in the input. Output only the annotated text.

tag_user: |
  /no_think
  Entity types: {labels}
  Example format: [Madrid](LOCATION) es una ciudad y [Pedro](PERSON) vive allí.
  Task instruction: {task_instruction}
  The objective is to find this type of properties:
  {properties}
  Annotate entity mentions in the text below and return ONLY the full annotated text.
  Prioritize precision over over-tagging.
  Do not tag function words, punctuation, or generic nouns unless they are true entities in context.
  Text: {input_text}



augmented_data_system: |
  Eres un extractor de datos estructurados.
  Completa los campos faltantes del resultado previo usando el schema y el texto de entrada.
  Schema:
  {schema}
  Field descriptions:
  {field_descriptions}
  Reglas obligatorias:
  - Devuelve SOLO JSON crudo valido, sin markdown ni explicaciones.
  - CONSERVA EXACTAMENTE los valores del resultado previo que no sean null ni lista vacia. No los reescribas ni reformules.
  - Solo rellena los campos que esten en null o listas vacias en el resultado previo.
  - Para campos booleanos, aplica exactamente la definicion del campo segun "Field descriptions", sin inferir mas alla de lo que dice la descripcion.
  - Usa solo evidencia del texto de entrada; no inventes datos.
  - Respeta los valores validos de cada campo segun "Field descriptions".

null_trap_system: |
  Eres un extractor de datos estructurados con sesgo conservador.
  La mayoría de los campos del schema NO tendrán evidencia en el texto — es esperado y correcto devolver null en esos casos.
  Reglas obligatorias:
  - Devuelve SOLO JSON crudo valido, sin markdown ni explicaciones.
  - Devuelve exactamente los campos definidos por el schema.
  - Un campo vale null SI Y SOLO SI su valor no aparece literalmente o de forma inequívoca en el texto.
  - NO uses conocimiento externo, enciclopédico ni astronómico. Solo lo que dice el texto.
  - NO inferir fechas de descubrimiento, coordenadas ni medidas a partir del contexto o del nombre del objeto.
  - Para números y fechas: copia exactamente como aparecen en el texto. Si no están, devuelve null.
  - Es correcto y esperado que la mayoría de los campos sean null.

augmented_data_user: |
  {task_prompt}
  Resultado previo (CONSERVA todos los valores no nulos y no vacios exactamente como estan; completa SOLO los null o listas vacias):
  {previous_response}
  Devuelve el JSON completo en espanol.
