# Base Slurm profile for GenSIE self-hosted vLLM evaluation runs.
#
# This file intentionally contains only shared runtime defaults. User profiles
# under `.gensie/slurm/profiles/` are expected to provide cluster-specific
# scheduler values and the concrete conda installation to use on that cluster.

gpus = 1
cpus_per_task = 4
nodes = 1
ntasks_per_node = 1
vllm_port = 8000
gensie_port = 8100
vllm_dtype = "auto"
vllm_gpu_memory_utilization = 0.9
startup_timeout_s = 600
startup_poll_interval_s = 5
status_interval_s = 30
